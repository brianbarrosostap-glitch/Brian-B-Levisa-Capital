# Supabase project config — used by the Supabase CLI
# Replace YOUR_PROJECT_REF with your actual project reference ID
# Found at: Dashboard → Project Settings → General → Reference ID

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # set true in production

# =============================================================
# Edge Functions
# One [functions.<name>] block per function. verify_jwt = true
# means Supabase rejects the request unless a valid user JWT is
# present in the Authorization header — every function here reads
# req.headers.get('Authorization') and calls auth.getUser(), so
# JWT verification MUST stay on.
#
# NOTE on secrets: SUPABASE_URL, SUPABASE_ANON_KEY and
# SUPABASE_SERVICE_ROLE_KEY are RESERVED — the platform injects
# them into every function automatically. Never put them in a
# function .env or `supabase secrets set` (the CLI rejects the
# SUPABASE_ prefix). Only add your OWN custom secrets there.
# =============================================================

[functions.approve-batch]
verify_jwt = true

[functions.submit-advance-request]
verify_jwt = true

[functions.match-confirmation]
verify_jwt = true

[functions.mark-invoice-status]
verify_jwt = true

# Machine ingest endpoints called by the Drive automation with the
# service-role key (NOT a browser user JWT), so verify_jwt is off and
# the function itself checks the bearer token equals the service key.
[functions.ingest-invoice]
verify_jwt = false

[functions.ingest-check]
verify_jwt = false
